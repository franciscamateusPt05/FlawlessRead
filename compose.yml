services:
  flawlessread:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_USERNAME: flawless
      SPRING_DATASOURCE_PASSWORD: 2024
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3307/flawlessread
    depends_on:
      - db
    ports:
      - "8080:8080"
  db:
    image: mysql
    container_name: fdb
    environment:
      MYSQL_ROOT_PASSWORD: test#123!
      MYSQL_DATABASE: flawlessread
      MYSQL_USER: flawless
      MYSQL_PASSWORD: 2024
    ports:
      - "3307:3306"