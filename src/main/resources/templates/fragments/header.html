<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<link rel="stylesheet" th:href="@{/styles.css}" />
<body>
<nav th:fragment="headerFragment">
    <div class="nav-container container">
        <!-- Logo -->
        <div class="logo">
            <a href="/" th:href="@{/}">FlawlessRead</a>
        </div>
        <!-- Nav links -->
        <div class="nav-links">
            <a href="#" th:href="@{/search}">Search</a>
            <a href="#" th:href="@{/searchByMusic}">Search By Music</a>
            <a href="#" th:href="@{/stats}">Statistics</a>
            <a href="#" th:href="@{/community}">Community</a>
        </div>
        <div sec:authorize="isAuthenticated()" style="display: flex; align-items: center; gap: 15px;">
            <a th:href="@{/profile}" style="font-weight: 600; color: var(--color5);" sec:authentication="name">User</a>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" style="background: none; border: none; color: var(--color5); cursor: pointer; font-weight: 500;">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
