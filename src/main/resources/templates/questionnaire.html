<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preference Questionnaire</title>
  <link rel="stylesheet" th:href="@{/styles.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Great+Vibes&display=swap" rel="stylesheet" />
</head>
<body>

<main class="container">
  <div class="auth-form-container">
    <h2>Preference Questionnaire</h2>
    <form method="post" action="/questionnaire" onsubmit="return validateCheckboxes()">
      <input type="hidden" name="userId" th:value="${user.id}" />

      <h3>Annual Reading Goal</h3>
      <label for="goalBook">Number of books per year:</label>
      <input type="number" id="goalBook" name="goalBook" min="1" max="1000" />

      <h3>Fiction</h3>
      <label><input type="checkbox" name="generosPreferidos" value="Fantasy"/> Fantasy</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Historical Fiction"/> Historical Fiction</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Horror"/> Horror</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Humor"/> Humor</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Literature"/> Literature</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Magic"/> Magic</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Mystery and detective stories"/> Mystery and detective stories</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Plays"/> Plays</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Poetry"/> Poetry</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Romance"/> Romance</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Science Fiction"/> Science Fiction</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Short Stories"/> Short Stories</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Thriller"/> Thriller</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Young Adult"/> Young Adult</label><br/>

      <h3>Business & Finance</h3>
      <label><input type="checkbox" name="generosPreferidos" value="Management"/> Management</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Entrepreneurship"/> Entrepreneurship</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Business Economics"/> Business Economics</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Business Success"/> Business Success</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Finance"/> Finance</label><br/>

      <h3>Biography</h3>
      <label><input type="checkbox" name="generosPreferidos" value="Autobiographies"/> Autobiographies</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="History"/> History</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Politics and Government"/> Politics and Government</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="World War II"/> World War II</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Women"/> Women</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Kings and Rulers"/> Kings and Rulers</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Composers"/> Composers</label><br/>
      <label><input type="checkbox" name="generosPreferidos" value="Artists"/> Artists</label><br/>


      <button type="submit">Submit</button>
    </form>
  </div>
</main>

<script>
  function validateCheckboxes() {
    const checkboxes = document.querySelectorAll('input[name="generosPreferidos"]:checked');
    const goalBook = document.getElementById('goalBook').value;

    if (!goalBook || parseInt(goalBook) < 1) {
      alert("Please enter a valid reading goal (at least 1 book).");
      return false;
    }

    if (checkboxes.length === 0) {
      alert("Please select at least one genre.");
      return false;
    }

    return true;
  }
</script>

</body>
</html>
