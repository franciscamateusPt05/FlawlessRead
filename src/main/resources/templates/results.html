<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Search Results</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet" />
</head>
<body>

<!-- Header -->
<div th:replace="fragments/header :: headerFragment"></div>

<!-- Main Content -->
<main class="container">
  <section class="welcome-section">
    <h2 class="great-vibes">Results for: <span th:text="${query}">Search</span></h2>
    <p th:if="${#lists.isEmpty(books)}">No books found for your search.</p>
  </section>

  <section class="books-section" th:if="${!#lists.isEmpty(books)}">
    <h2>Books Found</h2>
    <div class="books-grid">
      <a th:each="book, iterStat : ${books}"
         th:href="@{/books/{index}(index=${iterStat.index})}"
         style="text-decoration: none; color: inherit;">
        <div class="book-card">
          <img th:src="${book.getCapaUrl()}" alt="Book cover" />
          <h4 th:text="${book.getTitulo()}">Book Title</h4>
          <p th:text="${book.getAutor()}">Author</p>
        </div>
      </a>
    </div>
  </section>
</main>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
