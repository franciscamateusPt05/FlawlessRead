<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="${book.titulo}">Book Details</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div th:replace="fragments/header :: headerFragment"></div>

<div class="book-info">
  <div class="book-cover">
    <img th:src="${book.capaUrl}" alt="Book Cover" />
  </div>
  <h1 th:text="${book.titulo}">Book Title</h1>

  <p><strong>Author:</strong> <span th:text="${book.autor}">Author Name</span></p>
  <p><strong>Genre:</strong> <span th:text="${book.genero}">Genre</span></p>
  <p><strong>Publication Date:</strong> <span th:text="${book.formattedPublishDate}"></span></p>
  <p class="book-description" th:text="${descricao}">Book description...</p>

  <!-- "Want to Read" and "Already Read" buttons with simple icons and data-index -->
  <div class="reading-status-buttons">
    <button id="wantToReadBtn" title="Want to Read" aria-label="Want to Read" th:attr="data-index=${index}">
      📚 Want to Read
    </button>
    <button id="readBtn" title="Already Read" aria-label="Already Read" th:attr="data-index=${index}">
      ✔️ Already Read
    </button>
  </div>
</div>

<!-- Reviews Section -->
<div class="reviews-section">
  <h2>Reviews</h2>
  <div id="reviewsList">

    <div th:each="review : ${reviews}" class="review-item">
      <div class="review-header">
        <span class="review-username" th:text="${review.user.username}">Username</span>
        <div class="review-rating" th:attr="data-review-id=${review.id},data-rating=${review.rating}">
          <span th:each="starVal : ${#numbers.sequence(1,5)}"
                class="star"
                th:classappend="${starVal <= review.rating} ? ' filled' : ''">★</span>
        </div>
      </div>

      <p class="review-comment" th:text="${review.comment}">Review</p>
    </div>

    <p th:if="${#lists.isEmpty(reviews)}" class="no-reviews">No reviews yet.</p>
  </div>
</div>

<div class="add-review">

  <div id="userRating" class="user-rating">
    <span class="star" data-value="1">☆</span>
    <span class="star" data-value="2">☆</span>
    <span class="star" data-value="3">☆</span>
    <span class="star" data-value="4">☆</span>
    <span class="star" data-value="5">☆</span>
  </div>
  <textarea id="newReview" placeholder="Write your review..."></textarea>

  <button id="submitReviewBtn" th:attr="data-index=${index}">Submit Review</button>
</div>

<script>
  // Want to Read and Already Read buttons
  const wantToReadBtn = document.getElementById('wantToReadBtn');
  const readBtn = document.getElementById('readBtn');

  wantToReadBtn.addEventListener('click', () => {
    const index = wantToReadBtn.getAttribute('data-index');
    fetch(`/books/${index}/wantToRead`, {
      method: 'POST',
      credentials: 'same-origin'
    })
            .then(response => {
              if (response.ok) {
                wantToReadBtn.classList.add('active');
                alert('Book marked as Want to Read!');
              } else {
                alert('Error marking book as Want to Read.');
              }
            })
            .catch(() => alert('Request error.'));
  });

  readBtn.addEventListener('click', () => {
    const index = readBtn.getAttribute('data-index');
    fetch(`/books/${index}/alreadyRead`, {
      method: 'POST',
      credentials: 'same-origin'
    })
            .then(response => {
              if (response.ok) {
                readBtn.classList.add('active');
                alert('Book marked as Already Read!');
              } else {
                alert('Error marking book as Already Read.');
              }
            })
            .catch(() => alert('Request error.'));
  });

  // Clickable stars for rating existing reviews
  document.querySelectorAll('.review-rating').forEach(ratingDiv => {
    const reviewId = ratingDiv.getAttribute('data-review-id');
    const ratingValue = parseInt(ratingDiv.getAttribute('data-rating')) || 0;
    const stars = ratingDiv.querySelectorAll('.star');

    // Fill stars according to current rating
    function fillStars(value) {
      stars.forEach(star => {
        star.textContent = (parseInt(star.getAttribute('data-value')) <= value) ? '★' : '☆';
      });
    }

    fillStars(ratingValue);

    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = parseInt(star.getAttribute('data-value'));
        fillStars(value);

        alert(`You rated this review with ${value} stars.`);

        // Send rating to backend - adapt URL according to your API
        fetch(`/reviews/${reviewId}/rate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ rating: value })
        })
                .then(response => {
                  if (response.ok) {
                    alert('Review rating saved successfully!');
                  } else {
                    alert('Error saving review rating.');
                  }
                })
                .catch(() => alert('Error sending request to save review rating.'));
      });
    });
  });

  // Control stars for user's rating on the new review
  const userRatingStars = document.querySelectorAll('#userRating .star');
  let userRatingValue = 0;

  userRatingStars.forEach(star => {
    star.addEventListener('click', () => {
      userRatingValue = parseInt(star.getAttribute('data-value'));
      userRatingStars.forEach(s => {
        s.textContent = (parseInt(s.getAttribute('data-value')) <= userRatingValue) ? '★' : '☆';
      });
    });
  });

  // Submit new review with rating to backend
  document.getElementById('submitReviewBtn').addEventListener('click', () => {
    const index = document.getElementById('submitReviewBtn').getAttribute('data-index');
    const reviewText = document.getElementById('newReview').value.trim();

    if (!reviewText) {
      alert("Please write your review.");
      return;
    }
    if (userRatingValue === 0) {
      alert("Please give a star rating.");
      return;
    }

    fetch(`/books/${index}/review`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'same-origin',
      body: JSON.stringify({
        comment: reviewText,
        rating: userRatingValue
      })
    })
            .then(response => {
              if(response.ok) {
                alert("Review submitted successfully!");
                document.getElementById('newReview').value = '';
                userRatingValue = 0;
                userRatingStars.forEach(s => s.textContent = '☆');
              } else {
                alert("Error submitting review.");
              }
            })
            .catch(() => alert("Request error."));
  });
</script>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
