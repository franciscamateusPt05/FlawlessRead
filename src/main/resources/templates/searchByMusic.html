<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search by Music | FlawlessRead</title>
  <link rel="stylesheet" th:href="@{/styles.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

<div th:replace="fragments/header :: headerFragment"></div>

<section class="welcome-section">
  <h2 class="great-vibes">Discover New Worlds</h2>
  <h3>Search for books based on a song</h3>
  <p>Enter a song name to find books that match its vibe.</p>
</section>

<section class="container">
  <form th:action="@{/searchByMusic}" method="post" class="auth-form-container">
    <label for="trackName">Song Name:</label>
    <div class="search-wrapper">
      <input
              type="text"
              id="trackName"
              name="trackName"
              autocomplete="off"
              placeholder="Enter the song name..."
      />
      <!-- Hidden input for the artist -->
      <input type="hidden" id="artistName" name="artistName" />
      <div id="suggestions" class="autocomplete-suggestions"></div>
    </div>
    <button type="submit">Search</button>
  </form>
</section>

<div th:replace="fragments/footer :: footer"></div>

<script>
  const input = document.getElementById('trackName');
  const artistInput = document.getElementById('artistName');
  const suggestionsBox = document.getElementById('suggestions');

  input.addEventListener('input', async () => {
    const query = input.value.trim();
    if (query.length < 2) {
      suggestionsBox.innerHTML = '';
      artistInput.value = ''; // clear artist when input is emptied
      return;
    }

    const response = await fetch(`/spotify/suggestions?q=${encodeURIComponent(query)}`);
    const results = await response.json();

    suggestionsBox.innerHTML = '';
    results.forEach(item => {
      const div = document.createElement('div');
      div.classList.add('autocomplete-suggestion');
      div.textContent = item.name + ' - ' + item.artist;
      div.addEventListener('click', () => {
        input.value = item.name;
        artistInput.value = item.artist; // fill hidden artist field
        suggestionsBox.innerHTML = '';
      });
      suggestionsBox.appendChild(div);
    });
  });
</script>

</body>
</html>
